<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Secure Electron App</title>
  <!-- Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self';">
  <!-- FontAwesome -->
  <link rel="stylesheet" href="../node_modules/@fortawesome/fontawesome-free/css/all.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="../src/style.css">
  <!-- Script -->
  <script type="module" src="renderer.js
  "></script>

</head>
<body>
  <div class="app-container">
    <div class="titlebar flex-row justify-between">
      <!-- Titlebar Left -->
      <div class="flex-row align-center base-gap">
        <button class="btn titlebar-btn">
          File
        </button>
        <button class="btn titlebar-btn">
          Edit
        </button>
        <button class="btn titlebar-btn">
          View
        </button>
        <button class="btn titlebar-btn">
          Help
        </button>
      </div>
      
      <!-- Titlebar Right -->
      <div class="flex-row align-center base-gap">
        <!-- Titlebar Other Buttons -->
        <button
          id="explorer-toggle-btn"
          class="icon-btn titlebar-btn tooltip-bottom-right"
          tooltip="Toggle explorer"
        >
          <i class="fas fa-square-caret-left"></i>
        </button>
        <button
          id="bottom-menu-toggle-btn"
          class="icon-btn titlebar-btn tooltip-bottom-right"
          tooltip="Toggle Bottom Menu"
        >
          <i class="fas fa-square-caret-down"></i>
        </button>
        <button
          id="right-menu-toggle-btn"
          class="icon-btn titlebar-btn tooltip-bottom-right"
          tooltip="Toggle Right Menu"
        >
          <i class="fas fa-right-to-bracket"></i>
        </button>
      
        <!-- Titlebar Window Buttons -->
        <button
          id="minimize-btn"
          class="icon-btn titlebar-btn tooltip-bottom-right"
          tooltip="Minimize"
        >
          <i class="fas fa-minus"></i>
        </button>
      
        <button
          id="maximize-btn"
          class="icon-btn titlebar-btn tooltip-bottom-right"
          tooltip="Maximize/Restore"
        >
          <i class="far fa-square"></i>
        </button>
      
        <button
          id="close-btn"
          class="icon-btn titlebar-btn close-btn tooltip-bottom-right"
          tooltip="Close"
        >
          <i class="fas fa-xmark"></i>
        </button>
      
      </div>    </div>
    <div class="center-container">
      <div class="sidebar flex-col justify-between">
        <!-- Sidebar Top -->  
        <div class="flex-col base-gap">
          <button class="icon-btn sidebar-btn tooltip-bottom-left" tooltip="Sidebar Menu">
            <i class="fas fa-bars"></i>
          </button>
          <div class="sidebar-seperator"></div>
          <button class="icon-btn sidebar-btn tooltip-bottom-left" tooltip="Home">
            <i class="fas fa-home"></i>
          </button>
        </div>
        
        <!-- Sidebar Bottom -->
        <div class="flex-col base-gap">
          <div class="sidebar-seperator"></div>
          <button class="icon-btn sidebar-btn tooltip-top-left" tooltip="Information">
            <i class="fas fa-info-circle"></i>
          </button>
          <button class="icon-btn sidebar-btn tooltip-top-left" tooltip="Help">
            <i class="fas fa-question-circle"></i>
          </button>
          <button class="icon-btn sidebar-btn tooltip-top-left" tooltip="Settings">
            <i class="fas fa-cog"></i>
          </button>
        </div>      </div>
      <div class="explorer flex-col base-gap">
        <div class="explorer-resizer"></div>
        
        <div class="flex-row align-center justify-between">
          <p>
            Explorer
          </p>
          <button class="icon-btn explorer-btn tooltip-bottom-right" tooltip="Explorer Menu">
            <i class="fas fa-ellipsis-vertical"></i>
          </button>
        </div>
        
        <div class="treeview-container flex-col">
        
        </div>      </div>
      <div class="vertical-center-container">
        <div class="loader"></div>
        <div class="breadcrumb">

        </div>
        <div class="page-container">

        </div>
        <div class="bottom-menu flex-col base-gap">
          <div class="bottom-menu-resizer">
          
          </div>
          
          <div class="tab-bar flex-row align-center base-gap">
            <button class="btn tab-btn">
              Output
            </button>
            <button class="btn tab-btn">
              Attachments
            </button>
            <button class="btn tab-btn">
              System Info
            </button>
            <button class="btn tab-btn">
              Tasks
            </button>
          </div>
          
          <div class="bottom-menu-content-container">
          
          </div>        </div>
      </div>
      <div class="right-menu flex-col base-gap">
        <div class="flex-row align-center justify-between">
          <p>Right Menu</p>
          <button class="icon-btn close-btn tooltip-bottom-right" tooltip="Close Right Menu">
            <i class="fas fa-times"></i>
          </button>
        </div>
        
        <div class="right-menu-content"></div>      </div>
    </div>
    <div class="bottombar flex-row align-center justify-between"> 
      <div class="flex-row base-gap">
        <p>
          Created By: Craig Gent
        </p>
        <p>
          Version: 1.0.0
        </p>
      </div>
      
      <div class="flex-row base-gap">
      
      </div>
    </div>
  </div>
</body>
</html>
